version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mb-postgres-dev
    environment:
      POSTGRES_DB: monthbalance
      POSTGRES_USER: mbuser
      POSTGRES_PASSWORD: mbpass123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mb-network-dev

volumes:
  postgres-data-dev:

networks:
  mb-network-dev:
    driver: bridge
